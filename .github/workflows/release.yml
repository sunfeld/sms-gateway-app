name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate signing secrets
        run: |
          missing=""
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then missing="$missing KEYSTORE_BASE64"; fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then missing="$missing KEYSTORE_PASSWORD"; fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then missing="$missing KEY_ALIAS"; fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then missing="$missing KEY_PASSWORD"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi
          echo "All signing secrets are configured"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release-keystore.jks
          if [ ! -s release-keystore.jks ]; then
            echo "::error::Decoded keystore is empty"
            exit 1
          fi
          echo "Keystore decoded ($(wc -c < release-keystore.jks) bytes)"

      - name: Create keystore properties
        run: |
          echo "storeFile=release-keystore.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and sign release APK
        run: ./gradlew assembleRelease

      - name: Verify APK signature
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "::error::Release APK not found at $APK_PATH"
            ls -la app/build/outputs/apk/release/ || true
            exit 1
          fi
          # Find apksigner in Android SDK build-tools
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" -type f | sort -V | tail -1)
          if [ -n "$APKSIGNER" ]; then
            echo "Verifying APK signature with apksigner..."
            "$APKSIGNER" verify --verbose "$APK_PATH"
          else
            echo "Verifying APK signature with jarsigner..."
            jarsigner -verify -verbose -certs "$APK_PATH"
          fi
          echo "APK is properly signed"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
